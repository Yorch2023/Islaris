# PHAROS-AI · Entorno local completo
# Uso: docker-compose up -d
# Acceso: http://localhost  (admin / PharosAdmin2024!)

services:

  # ── Base de datos ────────────────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: pharos_root
      MARIADB_DATABASE: pharos_moodle
      MARIADB_USER: pharos
      MARIADB_PASSWORD: pharos_db
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Moodle 4.3 + plugins PHAROS ──────────────────────────────────────────────
  moodle:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      DB_HOST: db
      DB_NAME: pharos_moodle
      DB_USER: pharos
      DB_PASS: pharos_db
      MOODLE_WWWROOT: http://localhost
      MOODLE_ADMINPASS: PharosAdmin2024!
    volumes:
      - moodledata:/var/moodledata
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Middleware IA (Node.js → Claude API) ─────────────────────────────────────
  middleware:
    build:
      context: .
      dockerfile: Dockerfile.middleware
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      ALLOWED_ORIGINS: "http://localhost"
    restart: unless-stopped

volumes:
  db_data:
  moodledata:
