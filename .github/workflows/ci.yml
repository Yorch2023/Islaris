name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test-node:
    name: Node.js tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint --no-warn-ignored

      - name: Run Jest tests
        run: npm test -- --forceExit --ci --coverage
        env:
          MOODLE_SECRET: test-secret-ci
          ANTHROPIC_API_KEY: sk-ant-test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  lint-php:
    name: PHP syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer

      - name: Check PHP syntax (all plugin files)
        run: |
          errors=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              php -l "$file" >&2
              errors=$((errors + 1))
            fi
          done < <(find moodle-plugins moodle-theme -name "*.php" -print0)
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors PHP file(s) have syntax errors" >&2
            exit 1
          fi
          echo "All PHP files pass syntax check."

  validate-json:
    name: Validate JSON files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"

  validate-xmldb:
    name: Validate XMLDB schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
      - name: Check install.xml is well-formed XML
        run: |
          find moodle-plugins -name "install.xml" -print0 \
            | xargs -0 -I{} php -r "
                \$xml = simplexml_load_file('{}');
                if (\$xml === false) { fwrite(STDERR, 'Invalid XML: {}' . PHP_EOL); exit(1); }
                echo 'OK: {}' . PHP_EOL;
              "
